/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 smuser smuser
    dateext
    dateformat -%Y%m%d
    maxsize 100M
    postrotate
        # Send signal to application to reopen logs
        # In production, this would use a proper signal handler
        echo "Log rotated at $(date)" >> /logs/rotation.log
    endscript
}
